repos:
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-test
        name: cargo test
        entry: cargo test --all-targets --all-features
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty check
        entry: ty check
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true

      - id: yamloom-check
        name: yamloom check
        entry: yamloom check --file .yamloom.py
        language: system
        pass_filenames: false
        always_run: true
